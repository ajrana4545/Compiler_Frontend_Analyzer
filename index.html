<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compiler Front-End Analyzer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d0d;
    color: #d4d4d4;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: #111;
    border-bottom: 1px solid #2a2a2a;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 {
    font-size: 15px;
    color: #6ef;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  header span {
    color: #555;
    font-size: 11px;
  }

  /* ── Layout ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Left Panel: Editors ── */
  .left {
    width: 38%;
    min-width: 280px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid #2a2a2a;
  }

  .editor-block {
    display: flex;
    flex-direction: column;
    flex: 1;
    border-bottom: 1px solid #2a2a2a;
  }
  .editor-block:last-child { border-bottom: none; }

  .editor-label {
    background: #161616;
    padding: 5px 10px;
    font-size: 11px;
    color: #888;
    border-bottom: 1px solid #222;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .editor-label .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #6ef;
  }

  textarea {
    flex: 1;
    background: #0d0d0d;
    color: #c8e6c9;
    border: none;
    padding: 10px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    resize: none;
    outline: none;
    line-height: 1.6;
  }
  textarea::placeholder { color: #333; }

  /* ── Right Panel ── */
  .right {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  /* ── Module Buttons ── */
  .controls {
    background: #111;
    padding: 8px 12px;
    border-bottom: 1px solid #2a2a2a;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }

  .controls-label {
    color: #555;
    font-size: 11px;
    white-space: nowrap;
    margin-right: 4px;
  }

  button {
    background: #1a1a1a;
    color: #aaa;
    border: 1px solid #333;
    padding: 5px 12px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    cursor: pointer;
    border-radius: 3px;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  button:hover { background: #222; color: #6ef; border-color: #6ef; }
  button.active { background: #0a2a3a; color: #6ef; border-color: #6ef; }
  button.run-all { color: #8f8; border-color: #3a5a3a; }
  button.run-all:hover { background: #0a1f0a; color: #8f8; border-color: #8f8; }
  button.clear-btn { color: #f88; border-color: #5a2a2a; margin-left: auto; }
  button.clear-btn:hover { background: #1f0a0a; color: #f88; border-color: #f88; }

  /* ── Options row ── */
  .options {
    background: #0f0f0f;
    padding: 5px 12px;
    border-bottom: 1px solid #1e1e1e;
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .options label {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: #666;
    cursor: pointer;
  }
  .options label:hover { color: #aaa; }
  input[type=checkbox] { accent-color: #6ef; cursor: pointer; }

  /* ── Output ── */
  .output-header {
    background: #111;
    padding: 5px 12px;
    font-size: 11px;
    color: #555;
    border-bottom: 1px solid #1e1e1e;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #333;
  }
  .status-dot.running { background: #fa0; animation: blink 0.8s infinite; }
  .status-dot.ok  { background: #8f8; }
  .status-dot.err { background: #f88; }

  @keyframes blink { 50% { opacity: 0.3; } }

  #output {
    flex: 1;
    overflow-y: auto;
    padding: 12px 14px;
    white-space: pre-wrap;
    font-size: 12px;
    line-height: 1.65;
    color: #c8c8c8;
    background: #0d0d0d;
  }

  /* Output coloring */
  #output .section  { color: #6ef; }
  #output .ok       { color: #8f8; }
  #output .warn     { color: #fa0; }
  #output .err-line { color: #f88; }
  #output .info     { color: #aaa; }

  /* ── Parse Table ── */
  .parse-table-wrapper {
    overflow-x: auto;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #2a3a4a;
    background: #080d12;
  }
  .parse-table {
    border-collapse: collapse;
    font-size: 11px;
    min-width: 100%;
    white-space: nowrap;
  }
  .parse-table th {
    background: #0d2035;
    color: #6ef;
    padding: 6px 12px;
    border: 1px solid #1a3a55;
    text-align: center;
    letter-spacing: 0.5px;
    font-weight: bold;
    position: sticky;
    top: 0;
  }
  .parse-table th:first-child {
    background: #0a1a2a;
    color: #aef;
    text-align: left;
    min-width: 120px;
  }
  .parse-table td {
    padding: 5px 10px;
    border: 1px solid #1a2a3a;
    color: #c8e6c9;
    text-align: center;
    min-width: 120px;
    font-family: 'Courier New', monospace;
  }
  .parse-table td:first-child {
    color: #8ef;
    text-align: left;
    font-weight: bold;
    background: #0a1520;
    border-color: #1a3a55;
  }
  .parse-table tr:nth-child(even) td { background: #0b1822; }
  .parse-table tr:nth-child(odd)  td { background: #080d12; }
  .parse-table tr:nth-child(even) td:first-child { background: #0a1520; }
  .parse-table tr:hover td { background: #0e2030; filter: brightness(1.15); }
  .parse-table tr:hover td:first-child { background: #0d1e30; }
  .parse-table td.conflict {
    color: #fa0;
    background: #1a1200 !important;
    border-color: #4a3000;
  }
  .parse-table td.empty { color: #2a3a4a; }
</style>
</head>
<body>

<header>
  <h1>&#9654; Intelligent Compiler Front-End Analyzer</h1>
  <span>Lexical &rarr; Syntax &rarr; Semantic &rarr; Comparison</span>
</header>

<div class="layout">

  <!-- Left: Editors -->
  <div class="left">

    <div class="editor-block">
      <div class="editor-label">
        <span class="dot"></span> Source Code (.mc)
      </div>
      <textarea id="source"
        placeholder="// Write your Mini-C source code here&#10;int main() {&#10;    int x = 5;&#10;    return x;&#10;}"></textarea>
    </div>


  </div>

  <!-- Right: Controls + Output -->
  <div class="right">

    <div class="controls">
      <span class="controls-label">RUN MODULE:</span>
      <button onclick="run(1)" title="Lexical Analysis">1 · Lexical</button>
      <button onclick="run(2)" title="Grammar Processing">2 · Grammar</button>
      <button onclick="run(3)" title="Syntax Parsing">3 · Parsing</button>
      <button onclick="run(4)" title="Semantic Analysis">4 · Semantic</button>
      <button onclick="run(5)" title="Comparison Table">5 · Comparison</button>
      <button onclick="run(6)" title="Recommendation">6 · Recommend</button>
      <button class="run-all" onclick="run(0)">&#9654; Run All</button>
      <button class="clear-btn" onclick="clearOutput()">&#10005; Clear</button>
    </div>

    <div class="options">
      <label><input type="checkbox" id="opt-table"> Show parse tables (Module 3)</label>
    </div>

    <div class="output-header">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Ready — select a module and click Run</span>
    </div>

    <div id="output"><!-- output appears here --></div>

  </div>
</div>

<script>
const SERVER = 'http://localhost:8080/run';

// ── Grammar Inference Engine ──────────────────────────────────────────────────
// Analyses the source code and builds a grammar matched to constructs present.
function inferGrammar(src) {
  const has = (re) => re.test(src);

  // Detect language constructs
  const hasFunc      = has(/\b(int|float|void|char)\s+\w+\s*\(/);
  const hasLocalDecl = has(/\{[^}]*\b(int|float|char|void)\s+\w+\s*;/s);
  const hasIf        = has(/\bif\s*\(/);
  const hasElse      = has(/\belse\b/);
  const hasWhile     = has(/\bwhile\s*\(/);
  const hasFor       = has(/\bfor\s*\(/);
  const hasReturn    = has(/\breturn\b/);
  const hasAssign    = has(/\w+\s*=[^=]/);
  const hasArith     = has(/[+\-*\/]/);
  const hasCall      = has(/\w+\s*\([^)]*\)/);
  const hasCmp       = has(/==|!=|<=|>=|<|>/);
  const hasInt       = has(/\bint\b/);
  const hasFloat     = has(/\bfloat\b/);
  const hasVoid      = has(/\bvoid\b/);
  const hasChar      = has(/\bchar\b/);
  const hasParams    = has(/\(.*\b(int|float|char|void)\s+\w+/);
  const hasMultiDecl = has(/\{[^}]*(int|float|char|void)\s+\w+\s*;[^}]*(int|float|char|void)\s+\w+\s*;/s);

  const lines = [];

  // Header comment
  lines.push('# Grammar inferred from your source code');
  lines.push('# Format: NT -> sym1 sym2 | sym3 | ε');
  const terms = ['ID', 'NUM'];
  const types = [];
  if (hasInt)   types.push('int');
  if (hasFloat) types.push('float');
  if (hasVoid)  types.push('void');
  if (hasChar)  types.push('char');
  if (terms.length || types.length)
    lines.push('# Terminals: ' + [...types, ...terms,
      hasIf?'if':'', hasElse?'else':'', hasWhile?'while':'', hasFor?'for':'',
      hasReturn?'return':'', 'and punctuation'
    ].filter(Boolean).join(', '));
  lines.push('');

  // program
  if (hasFunc) {
    lines.push('program -> decl_list');
    lines.push('decl_list -> decl decl_list | ε');
  } else {
    lines.push('program -> stmt_list');
  }

  // decl
  if (hasFunc) {
    const declParts = [];
    declParts.push('type ID ( params ) { stmt_list }');
    if (hasLocalDecl) declParts.push('type ID ;');
    lines.push('decl -> ' + declParts.join(' | '));
  }

  // type
  if (types.length) {
    lines.push('type -> ' + types.join(' | '));
  }

  // params
  if (hasParams) {
    lines.push('params -> type ID param_list | ε');
    lines.push('param_list -> , type ID param_list | ε');
  } else if (hasFunc) {
    lines.push('params -> ε');
  }

  // stmt_list
  lines.push('stmt_list -> stmt stmt_list | ε');

  // stmt productions
  const stmtProds = [];
  if (hasLocalDecl) stmtProds.push('type ID ;');           // local var decl
  if (hasAssign || hasCall || hasArith)
    stmtProds.push('expr ;');
  stmtProds.push('{ stmt_list }');
  if (hasIf && hasElse) stmtProds.push('if ( expr ) stmt else stmt');
  if (hasIf)            stmtProds.push('if ( expr ) stmt');
  if (hasWhile)         stmtProds.push('while ( expr ) stmt');
  if (hasFor)           stmtProds.push('for ( expr ; expr ; expr ) stmt');
  if (hasReturn) {
    stmtProds.push('return expr ;');
    stmtProds.push('return ;');
  }
  lines.push('stmt -> ' + stmtProds.join('\nstmt -> '));

  // expr
  const exprProds = [];
  if (hasAssign) exprProds.push('ID = expr');
  exprProds.push('cmp_expr');
  lines.push('expr -> ' + exprProds.join(' | '));

  // comparison expr
  if (hasCmp) {
    lines.push('cmp_expr -> add_expr cmp_op add_expr | add_expr');
    lines.push('cmp_op -> == | != | < | > | <= | >=');
  } else {
    lines.push('cmp_expr -> add_expr');
  }

  // arithmetic
  if (hasArith) {
    lines.push('add_expr -> mul_expr add_expr_p');
    lines.push('add_expr_p -> + mul_expr add_expr_p | - mul_expr add_expr_p | ε');
    lines.push('mul_expr -> unary mul_expr_p');
    lines.push('mul_expr_p -> * unary mul_expr_p | / unary mul_expr_p | ε');
  } else {
    lines.push('add_expr -> unary');
  }

  // unary / primary
  const unaryProds = ['( expr )'];
  if (hasCall) unaryProds.push('ID ( arg_list )');
  unaryProds.push('ID');
  unaryProds.push('NUM');
  lines.push('unary -> ' + unaryProds.join(' | '));

  // function call args
  if (hasCall) {
    lines.push('arg_list -> expr arg_list_p | ε');
    lines.push('arg_list_p -> , expr arg_list_p | ε');
  }

  return lines.join('\n');
}



const MODULE_NAMES = {
  0: 'All Modules',
  1: 'Module 1: Lexical Analysis',
  2: 'Module 2: Grammar Processing',
  3: 'Module 3: Syntax Parsing',
  4: 'Module 4: Semantic Analysis',
  5: 'Module 5: Comparison Engine',
  6: 'Module 6: Recommendation',
};

function setStatus(state, text) {
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot ' + state;
  document.getElementById('status-text').textContent = text;
}

function clearOutput() {
  document.getElementById('output').innerHTML = '';
  setStatus('', 'Ready — select a module and click Run');
}

/**
 * Detect and convert the LL(1) parse table ASCII block into an HTML <table>.
 * The C++ backend outputs:
 *   === LL(1) Parse Table ===
 *   <header row with | separated cells>
 *   <dashes row>
 *   <data rows with | separated cells>
 */
function convertParseTable(lines) {
  // Find the === LL(1) Parse Table === marker
  const startIdx = lines.findIndex(l => /=== LL\(1\) Parse Table ===/i.test(l));
  if (startIdx === -1) return null; // no table found

  // Find the header row (first row after the title that contains '|')
  let headerIdx = -1;
  for (let i = startIdx + 1; i < lines.length; i++) {
    if (lines[i].includes('|')) { headerIdx = i; break; }
  }
  if (headerIdx === -1) return null;

  // Find the dashes separator row (immediately after header)
  const dashIdx = headerIdx + 1;

  // Collect data rows: rows that contain '|' after the dashes
  const dataRows = [];
  for (let i = dashIdx + 1; i < lines.length; i++) {
    const l = lines[i];
    // Stop if we hit a blank section header or another === block
    if (/^={3}/.test(l.trim()) && !/parse table/i.test(l)) break;
    if (/^---+$/.test(l.trim())) break;
    if (l.includes('|')) dataRows.push(l);
    else if (l.trim() === '' && dataRows.length > 0) break;
  }

  // Parse a row of pipe-separated cells
  const parseRow = (line) => {
    return line.split('|').map(c => c.trim()).filter((c, i, arr) => i > 0 || c !== '' || arr.length > 1);
  };

  const headers = parseRow(lines[headerIdx]);
  // End index is dashIdx + 1 + dataRows length accounting for the lines consumed
  const tableEndIdx = dashIdx + 1 + dataRows.length;

  // Build HTML table
  let html = '<div class="parse-table-wrapper"><table class="parse-table">';
  // Header
  html += '<thead><tr>';
  for (const h of headers) {
    html += `<th>${esc(h)}</th>`;
  }
  html += '</tr></thead><tbody>';
  // Data rows
  for (const row of dataRows) {
    const cells = parseRow(row);
    html += '<tr>';
    for (let ci = 0; ci < cells.length; ci++) {
      const cell = cells[ci];
      const isConflict = cell.endsWith('!');
      const displayCell = isConflict ? cell.slice(0, -1) + ' ⚠' : cell;
      if (ci === 0) {
        html += `<td>${esc(displayCell)}</td>`;
      } else if (cell === '') {
        html += `<td class="empty">—</td>`;
      } else if (isConflict) {
        html += `<td class="conflict">${esc(displayCell)}</td>`;
      } else {
        html += `<td>${esc(displayCell)}</td>`;
      }
    }
    html += '</tr>';
  }
  html += '</tbody></table></div>';

  return { html, startIdx, tableEndIdx };
}

function colorize(text) {
  const lines = text.split('\n');

  // Try to extract and replace the parse table block
  const tableResult = convertParseTable(lines);

  let htmlParts = [];
  let skipUntil = -1;

  const colorLines = lines.map((line, idx) => {
    if (tableResult) {
      if (idx === tableResult.startIdx) {
        // Render title line then inject table
        return `<span class="section">${esc(line)}</span>`;
      }
      if (idx > tableResult.startIdx && idx < tableResult.tableEndIdx) {
        // These lines are consumed by the table
        if (idx === tableResult.startIdx + 1) {
          // First line after title: inject the table HTML
          return tableResult.html;
        }
        return null; // suppress remaining raw table lines
      }
    }
    // Section headers
    if (/^=+$/.test(line.trim()) || /MODULE \d/.test(line) || /^---/.test(line) || /^==/.test(line.trim()))
      return `<span class="section">${esc(line)}</span>`;
    // OK / PASS
    if (/\[OK\]|PASSED|SUCCESS|ACCEPT/.test(line))
      return `<span class="ok">${esc(line)}</span>`;
    // Warnings
    if (/\[WARN\]|conflict|CONFLICT|WARNING/.test(line))
      return `<span class="warn">${esc(line)}</span>`;
    // Errors
    if (/\[FAIL\]|FAIL|ERROR|error/.test(line))
      return `<span class="err-line">${esc(line)}</span>`;
    // Best / recommendations
    if (/BEST|RECOMMEND|score/.test(line))
      return `<span class="ok">${esc(line)}</span>`;
    return esc(line);
  });

  return colorLines.filter(l => l !== null).join('\n');
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function run(module) {
  const source  = document.getElementById('source').value.trim();
  const tokens  = '';
  const table   = document.getElementById('opt-table').checked;

  if (!source) { alert('Please enter source code.'); return; }

  // Auto-infer grammar from source code every time
  const grammar = inferGrammar(source);

  // Module 2: show the inferred grammar in the output panel first
  if (module === 2) {
    const grammarLines = grammar.split('\n').map(line => {
      if (line.startsWith('#')) return `<span class="info">${esc(line)}</span>`;
      if (line.trim() === '')   return '';
      const parts = line.split('->');
      if (parts.length === 2) {
        return `<span class="ok">${esc(parts[0].trim())}</span>` +
               ` <span class="section">-&gt;</span>` +
               ` <span style="color:#c8e6c9">${esc(parts[1].trim())}</span>`;
      }
      return esc(line);
    }).join('\n');

    document.getElementById('output').innerHTML =
      `<span class="section">========================================================================</span>\n` +
      `<span class="section">         MODULE 2: GRAMMAR PROCESSING</span>\n` +
      `<span class="section">========================================================================</span>\n\n` +
      `<span class="info">[ Inferred from your source code ]</span>\n\n` +
      `<span class="section">=== Grammar Productions ===</span>\n` +
      grammarLines + '\n\n' +
      `<span class="info">[ Sending to backend for FIRST/FOLLOW analysis... ]</span>\n`;

    setStatus('running', 'Module 2: Grammar Processing — computing FIRST/FOLLOW...');
  } else {
    setStatus('running', `Running ${MODULE_NAMES[module]}...`);
    document.getElementById('output').innerHTML = `<span class="info">Running ${MODULE_NAMES[module]}...\n</span>`;
  }

  try {
    const res = await fetch(SERVER, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ source, grammar, tokens, module, table })
    });

    if (!res.ok) throw new Error(`Server error: ${res.status}`);
    const data = await res.json();
    const output = data.output || '(no output)';

    // For module 2: append backend output below the grammar display
    if (module === 2) {
      document.getElementById('output').innerHTML += colorize(output);
    } else {
      document.getElementById('output').innerHTML = colorize(output);
    }

    const hasError = /ERROR|FAIL/.test(output);
    setStatus(hasError ? 'err' : 'ok',
      `${MODULE_NAMES[module]} — done ${hasError ? '(errors found)' : '\u2713'}`);

  } catch (e) {
    document.getElementById('output').innerHTML +=
      `<span class="err-line">Cannot connect to server.\n\nMake sure you ran:\n  python server.py\n\nError: ${esc(e.message)}</span>`;
    setStatus('err', 'Server not reachable');
  }
}
</script>
</body>
</html>
